<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link type="image/png" sizes="32x32" rel="icon" href="/assets/pcloud-color-32.png">
    <link type="image/png" sizes="72x72" rel="icon" href="/assets/pcloud-color-72.png">
    <title>pCloud Storage Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #6e6c8b;
            --secondary: #a855f7;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --card-bg: rgba(255, 255, 255, 0.1);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-secondary: #cbd5e1;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        [data-theme="light"] {
            --card-bg: rgba(255, 255, 255, 0.9);
            --glass: rgba(255, 255, 255, 0.7);
            --border: rgba(0, 0, 0, 0.1);
            --text: #1e293b;
            --text-secondary: #475569;
            --dark: #f8fafc;
            --light: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text);
            transition: all 0.3s ease;
        }

        [data-theme="light"] body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        /* Login Screen */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }


        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            width: 100%;
            justify-content: center;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        /* Main App */
        .app-container {
            display: none;
            min-height: 100vh;
        }

        .header {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--text), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-bar {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--glass);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .storage-info {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .storage-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .storage-bar {
            height: 8px;
            background: var(--glass);
            border-radius: 4px;
            overflow: hidden;
        }

        .storage-progress {
            height: 100%;
            background: linear-gradient(135deg, var(--text), var(--text-secondary));
            border-radius: 4px;
            transition: width 1s ease;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .breadcrumb-item {
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .breadcrumb-item:hover {
            color: var(--primary);
        }

        .breadcrumb-separator {
            color: var(--text-secondary);
        }

        .view-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 12px;
        }

        .view-buttons {
            display: flex;
            gap: 8px;
        }

        .files-container {
            display: grid;
            gap: 16px;
        }

        .grid-view {
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        }

        .list-view {
            grid-template-columns: 1fr;
        }

        .file-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .file-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
            border-color: var(--primary);
        }

        .file-icon {
            font-size: 48px;
            margin-bottom: 12px;
            text-align: center;
        }

        .list-view .file-card {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .list-view .file-icon {
            font-size: 24px;
            margin: 0;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .file-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .file-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .list-view .file-actions {
            margin-top: 0;
        }

        .action-btn {
            padding: 6px 12px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text);
        }

        .action-btn:hover {
            background: var(--primary);
            color: var(--light);
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
            padding: 16px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Config section */
        .config-section {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: stretch;
            }

            .search-bar {
                max-width: 100%;
            }

            .grid-view {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="loginScreen">
        <div class="login-card">
            <div class="login-header">
                <h1>pCloud Manager</h1>
                <p style="color: var(--text-secondary);">Sign in to access your storage</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    Sign In
                </button>
            </form>
            <div id="loginError" style="color: var(--danger); text-align: center; margin-top: 16px; display: none;"></div>
            <div style="text-align: center; margin-top: 16px;">
                <button type="button" class="action-btn" onclick="showConfigScreen()">Configure API</button>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div class="app-container" id="appContainer">
        <header class="header">
            <div class="header-content">
                <div class="logo">pCloud</div>
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" placeholder="Search files..." id="searchInput">
                </div>
                <div class="header-actions">
                    <button id="viewToggleBtn" class="icon-btn" title="Toggle View">
                        <span id="viewIcon">⊞</span>
                    </button>
                    <button id="themeToggleBtn" class="icon-btn" title="Toggle Theme">
                        <span id="themeIcon">🌙</span>
                    </button>
                    <button id="configBtn" class="icon-btn" onclick="showConfigScreen()" title="Configure API">
                        <span>⚙️</span>
                    </button>
                    <button id="logoutBtn" class="icon-btn" title="Logout">
                        <span>🚪</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="main-content">
            <div class="storage-info">
                <div class="storage-header">
                    <span>Storage Usage</span>
                    <span id="storageText">Loading...</span>
                </div>
                <div class="storage-bar">
                    <div class="storage-progress" id="storageProgress" style="width: 0%"></div>
                </div>
            </div>

            <div class="breadcrumb" id="breadcrumb">
                <span class="breadcrumb-item" onclick="navigateToFolder('/')">Home</span>
            </div>

            <div class="view-controls">
                <h2 id="folderTitle">Files</h2>
                <div class="view-buttons">
                    <select id="sortSelect" class="form-input" style="padding: 8px; width: auto;">
                        <option value="name">Name</option>
                        <option value="size">Size</option>
                        <option value="modified">Modified</option>
                        <option value="type">Type</option>
                    </select>
                </div>
            </div>

            <div id="filesContainer" class="files-container grid-view"></div>
        </div>
    </div>

    <script>
        // App State
        let currentUser = null;
        let currentPath = '/';
        let currentFiles = [];
        let viewMode = 'grid';
        let theme = 'dark';
        let apiBaseUrl = 'https://your.workers.link.here';

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            checkAuth();
            
            // Event listeners
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('viewToggleBtn').addEventListener('click', toggleView);
            document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('searchInput').addEventListener('input', renderFiles);
            document.getElementById('sortSelect').addEventListener('change', renderFiles);
        });


        // Authentication
        async function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${apiBaseUrl}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    currentUser = data.user;
                    showApp();
                    loadFiles('/');
                    loadStorageInfo();
                } else {
                    showLoginError(data.error || 'Invalid credentials');
                }
            } catch (error) {
                console.error('Login error:', error);
                showLoginError('Connection error. Please check your API URL and try again.');
            }
        }

        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            if (token && user && apiBaseUrl) {
                currentUser = JSON.parse(user);
                showApp();
                loadFiles('/');
                loadStorageInfo();
            }
        }

        function showApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
        }

        function showLoginError(message) {
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            currentUser = null;
            document.getElementById('configScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // API Calls
        async function apiCall(endpoint, options = {}) {
            if (!apiBaseUrl) {
                throw new Error('API URL not configured');
            }
            
            const token = localStorage.getItem('token');
            
            const response = await fetch(`${apiBaseUrl}/api${endpoint}`, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });

            if (response.status === 401) {
                logout();
                throw new Error('Session expired');
            }

            return response;
        }

        async function loadFiles(path) {
            currentPath = path;
            updateBreadcrumb();
            showLoading();

            try {
                console.log('Loading files for path:', path);
                const response = await apiCall(`/files?path=${encodeURIComponent(path)}`);
                const data = await response.json();
                
                console.log('Files response:', data);

                if (response.ok) {
                    currentFiles = data.contents || [];
                    console.log('Loaded files count:', currentFiles.length);
                    renderFiles();
                } else {
                    console.error('API error:', data);
                    showError(data.error || 'Failed to load files');
                }
            } catch (error) {
                console.error('Network error:', error);
                showError('Failed to load files: ' + error.message);
            }
        }

        async function loadStorageInfo() {
            try {
                const response = await apiCall('/storage');
                const data = await response.json();

                if (response.ok) {
                    const used = data.usedquota || 0;
                    const total = data.quota || 1;
                    const percentage = Math.round((used / total) * 100);
                    
                    document.getElementById('storageText').textContent = 
                        `${formatSize(used)} / ${formatSize(total)} (${percentage}%)`;
                    document.getElementById('storageProgress').style.width = `${percentage}%`;
                }
            } catch (error) {
                console.error('Failed to load storage info');
            }
        }

        async function downloadFile(fileId, fileName) {
            try {
                const response = await apiCall(`/download?fileId=${fileId}&name=${encodeURIComponent(fileName)}`);
                const data = await response.json();

                if (response.ok && data.link) {
                    const a = document.createElement('a');
                    a.href = data.link;
                    a.download = fileName;
                    a.target = '_blank';
                    a.click();
                } else {
                    alert('Failed to generate download link');
                }
            } catch (error) {
                alert('Failed to download file');
            }
        }

        function copyLink(fileId, fileName) {
            apiCall(`/download?fileId=${fileId}&name=${encodeURIComponent(fileName)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.link) {
                        navigator.clipboard.writeText(data.link);
                        alert('Link copied to clipboard!');
                    }
                });
        }

        // UI Functions
        function renderFiles() {
            const container = document.getElementById('filesContainer');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let files = currentFiles.filter(f =>
                f.name.toLowerCase().includes(searchTerm)
            );

            // Sort files
            const sortBy = document.getElementById('sortSelect').value;
            files = sortFiles(files, sortBy);

            if (files.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <h3>No files found</h3>
                        <p>This folder is empty or no files match your search</p>
                    </div>
                `;
                return;
            }

            // Build file cards without inline onclick
            container.innerHTML = files.map(file => {
                const isFolder = file.isfolder;
                const icon = getFileIcon(file.name, isFolder);
                const size = isFolder ? '--' : formatSize(file.size);
                const modified = formatDate(file.modified);

                return `
                    <div class="file-card" 
                        data-path="${file.path}" 
                        data-folder="${isFolder}" 
                        data-fileid="${file.fileid || ''}" 
                        data-filename="${file.name}">
                        <div class="file-icon">${icon}</div>
                        <div class="file-info">
                            <div class="file-name">${file.name}</div>
                            <div class="file-meta">${size} • ${modified}</div>
                        </div>
                        ${!isFolder ? `
                            <div class="file-actions">
                                <button class="action-btn download-btn">Download</button>
                                <button class="action-btn copy-btn">Copy Link</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            }).join('');

            // Attach folder click handlers
            document.querySelectorAll('.file-card[data-folder="true"]').forEach(card => {
                card.addEventListener('click', () => {
                    const path = card.getAttribute('data-path');
                    navigateToFolder(path);
                });
            });

            // Attach download button handlers
            document.querySelectorAll('.download-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.file-card');
                    const fileId = card.getAttribute('data-fileid');
                    const fileName = card.getAttribute('data-filename');
                    downloadFile(fileId, fileName);
                });
            });

            // Attach copy link handlers
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const card = btn.closest('.file-card');
                    const fileId = card.getAttribute('data-fileid');
                    const fileName = card.getAttribute('data-filename');
                    copyLink(fileId, fileName);
                });
            });
        }

        function sortFiles(files, sortBy) {
            const folders = files.filter(f => f.isfolder);
            const items = files.filter(f => !f.isfolder);

            const sortFn = {
                name: (a, b) => a.name.localeCompare(b.name),
                size: (a, b) => (b.size || 0) - (a.size || 0),
                modified: (a, b) => new Date(b.modified) - new Date(a.modified),
                type: (a, b) => {
                    const extA = a.name.split('.').pop().toLowerCase();
                    const extB = b.name.split('.').pop().toLowerCase();
                    return extA.localeCompare(extB);
                }
            };

            folders.sort(sortFn.name);
            items.sort(sortFn[sortBy] || sortFn.name);

            return [...folders, ...items];
        }

        function navigateToFolder(path) {
            loadFiles(path);
        }

        function updateBreadcrumb() {
            const parts = currentPath.split('/').filter(p => p);
            const breadcrumb = document.getElementById('breadcrumb');
            
            let html = `<span class="breadcrumb-item" data-path="/">Home</span>`;
            let path = '';
            
            parts.forEach(part => {
                path += '/' + part;
                html += `<span class="breadcrumb-separator"> / </span>`;
                html += `<span class="breadcrumb-item" data-path="${path}">${part}</span>`;
            });
            
            breadcrumb.innerHTML = html;

            // Attach click handlers
            breadcrumb.querySelectorAll('.breadcrumb-item').forEach(item => {
                item.addEventListener('click', () => {
                    const path = item.getAttribute('data-path');
                    navigateToFolder(path);
                });
            });
        }

        function showLoading() {
            document.getElementById('filesContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            `;
        }

        function showError(message) {
            document.getElementById('filesContainer').innerHTML = `
                <div class="error-message">${message}</div>
            `;
        }

        function toggleView() {
            const container = document.getElementById('filesContainer');
            viewMode = viewMode === 'grid' ? 'list' : 'grid';
            container.className = `files-container ${viewMode}-view`;
            document.getElementById('viewIcon').textContent = viewMode === 'grid' ? '☰' : '⊞';
            renderFiles();
        }

        function toggleTheme() {
            theme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeIcon').textContent = theme === 'dark' ? '🌙' : '☀️';
            localStorage.setItem('theme', theme);
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            theme = savedTheme;
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('themeIcon').textContent = theme === 'dark' ? '🌙' : '☀️';
        }

        // Utility functions
        function getFileIcon(fileName, isFolder) {
            if (isFolder) return '📁';
            
            const ext = fileName.split('.').pop().toLowerCase();
            const icons = {
                pdf: '📄',
                doc: '📝', docx: '📝',
                xls: '📊', xlsx: '📊',
                ppt: '📽️', pptx: '📽️',
                jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', svg: '🖼️',
                mp4: '🎬', avi: '🎬', mov: '🎬', mkv: '🎬',
                mp3: '🎵', wav: '🎵', flac: '🎵',
                zip: '📦', rar: '📦', '7z': '📦',
                txt: '📃',
                html: '🌐', css: '🎨', js: '⚡', json: '🔧',
                py: '🐍', java: '☕', cpp: '🔷', c: '🔷'
            };
            
            return icons[ext] || '📎';
        }

        function formatSize(bytes) {
            if (!bytes) return '0 B';
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return Math.round(bytes / Math.pow(1024, i) * 100) / 100 + ' ' + sizes[i];
        }

        function formatDate(dateString) {
            if (!dateString) return 'Unknown';
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            if (diff < 86400000) {
                const hours = Math.floor(diff / 3600000);
                if (hours < 1) return 'Just now';
                return `${hours} hour${hours > 1 ? 's' : ''} ago`;
            }
            
            return date.toLocaleDateString();
        }
    </script>
</body>
</html>
